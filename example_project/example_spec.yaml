- label: Sprite
  group: sprites
  aabb: rect
  path: file_name
  properties:
    name: string
    frame: integer
    collision: rect[]
    origin: point
    chroma_key: color
    direction: enum[up, down, left, right]
    variant: string
    tags: string[]

- label: Tile
  group: tiles
  aabb: rect
  path: file_name
  properties:
    name: string
    solid: boolean
    layer: enum[background, foreground, overlay]
    chroma_key: color
    tags: string[]

- label: Waypoint
  group: waypoints
  point: point
  properties:
    name: string
    order: integer
    type: enum[spawn, entrance, exit, warp]
