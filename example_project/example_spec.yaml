- label: Sprite
  group: sprites
  aabb: rect
  path: file_name
  chroma_key: color
  name: string
  frame: ainteger
  duration: integer
  offset: point
  properties:
    collision: rect[]
    direction: enum[up, down, left, right]
    variant: string
    tags: string[]

- label: Tile
  group: tiles
  aabb: rect
  path: file_name
  chroma_key: color
  properties:
    name: string
    solid: boolean
    layer: enum[background, foreground, overlay]
    tags: string[]

- label: Waypoint
  group: waypoints
  point: point
  properties:
    name: string
    order: integer
    type: enum[spawn, entrance, exit, warp]
